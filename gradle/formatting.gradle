allprojects {
    project.apply plugin: "com.diffplug.spotless"
    spotless {
        java {
            target 'src/**/*.java'
            removeUnusedImports()
	    // mirror.umd.edu went dead (404); let download.eclipse.org pick a live mirror
	    eclipse().configFile rootProject.file('buildSrc/formatterConfig.xml')
	    trimTrailingWhitespace()
        }
    }
}
